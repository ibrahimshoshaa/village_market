name: village_market
description: "سوق القرية - Village Market: Multi-vendor marketplace, service directory, and community hub for rural villages."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State Management ---
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # --- Routing ---
  go_router: ^14.6.2

  # --- Firebase ---
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  cloud_functions: ^5.1.6
  firebase_messaging: ^15.1.5
  firebase_crashlytics: ^4.1.5
  firebase_app_check: ^0.3.1+6
  firebase_analytics: ^11.3.5

  # --- Geolocation & Maps ---
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  google_maps_flutter: ^2.10.0
  geoflutterfire_plus: ^0.0.32

  # --- Local Storage / Offline ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.3.3

  # --- Images ---
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.3.0
  image_picker: ^1.1.2

  # --- Utilities ---
  intl: 0.20.2
  meta: ^1.15.0
  equatable: ^2.0.7
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1

  # --- UI ---
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # --- Code Generation ---
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # --- Testing ---
  mocktail: ^1.0.4
  firebase_auth_mocks: ^0.14.1
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true
  generate: true # enables flutter_localizations codegen from l10n.yaml

