name: Build Release APK
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true
      - name: Inject google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
      - name: Inject Android Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
      - name: Inject key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cat <<EOF > android/key.properties
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
      - name: Install dependencies
        run: flutter pub get
      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs
      - name: Restore manually generated files
        run: |
          cat <<'DART' > lib/features/cart/data/models/cart_item_model.g.dart
          // GENERATED CODE - DO NOT MODIFY BY HAND

          part of 'cart_item_model.dart';

          // **************************************************************************
          // TypeAdapterGenerator
          // **************************************************************************

          class CartItemModelAdapter extends TypeAdapter<CartItemModel> {
            @override
            final int typeId = 0;

            @override
            CartItemModel read(BinaryReader reader) {
              final numOfFields = reader.readByte();
              final fields = <int, dynamic>{
                for (int i = 0; i < numOfFields; i++) reader.readByte(): reader.read(),
              };
              return CartItemModel(
                productId: fields[0] as String,
                shopId: fields[1] as String,
                shopName: fields[2] as String,
                productName: fields[3] as String,
                imageUrl: fields[4] as String?,
                unitPrice: fields[5] as double,
                quantity: fields[6] as int,
              );
            }

            @override
            void write(BinaryWriter writer, CartItemModel obj) {
              writer
                ..writeByte(7)
                ..writeByte(0)
                ..write(obj.productId)
                ..writeByte(1)
                ..write(obj.shopId)
                ..writeByte(2)
                ..write(obj.shopName)
                ..writeByte(3)
                ..write(obj.productName)
                ..writeByte(4)
                ..write(obj.imageUrl)
                ..writeByte(5)
                ..write(obj.unitPrice)
                ..writeByte(6)
                ..write(obj.quantity);
            }

            @override
            int get hashCode => typeId.hashCode;

            @override
            bool operator ==(Object other) =>
                identical(this, other) ||
                other is CartItemModelAdapter &&
                    runtimeType == other.runtimeType &&
                    typeId == other.typeId;
          }
          DART
      - name: Run static analysis
        run: flutter analyze --no-fatal-infos
      - name: Build Release APK
        run: flutter build apk --release --split-per-abi
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: village-market-release-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
      - name: Clean up sensitive files
        if: always()
        run: |
          rm -f android/app/google-services.json
          rm -f android/app/upload-keystore.jks
          rm -f android/key.properties
